<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05060a">
  <title>{{ self_type|capitalize }} Self - SelfChat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="display display--{{ self_type }}" data-self-type="{{ self_type }}">
  <main class="temporal-screen">
    <!-- One full-screen canvas. Its shapes and colours depend on self_type. -->
    <canvas id="temporal-canvas" aria-hidden="true"></canvas>
    <div class="ambient-vignette" aria-hidden="true"></div>

    <section class="voice" aria-live="polite">
      <p class="voice__intro" id="voice-intro"></p>
      <h1 class="voice__message" id="voice-message">
        {{ "I am Past Yourself." if self_type == "past" else "I am Future Yourself." }}
      </h1>
      <p class="voice__caption" id="voice-caption"></p>
    </section>

    <div class="listening" id="listening" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </main>

  <script src="{{ url_for('static', filename='background.js') }}"></script>
  <script src="{{ url_for('static', filename='interaction.js') }}"></script>
</body>
</html>
