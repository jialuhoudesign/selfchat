<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#d8d6d0">
  <title>SelfChat - Control</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="control">
  <main class="control-panel">
    <h1>How have you been lately?</h1>

    <form id="situation-form" class="control-form">
      <label class="visually-hidden" for="situation">Your answer</label>
      <textarea id="situation" name="situation" rows="4" maxlength="600"
        placeholder="Type here..." required autofocus></textarea>

      <div class="control-form__actions">
        <button id="submit-button" class="primary-button" type="submit">Send</button>
        <button id="reset-button" class="text-button" type="button">Reset</button>
      </div>

      <p class="form-status" id="form-status" aria-live="polite">Ready.</p>
    </form>
  </main>

  <script src="{{ url_for('static', filename='interaction.js') }}"></script>
</body>
</html>
