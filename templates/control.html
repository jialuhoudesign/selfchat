<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0c0e">
  <title>SelfChat — Control</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="control">
  <main class="control-panel">
    <p class="control-panel__kicker">SelfChat / Temporal Self Dialogue</p>
    <h1>Where are you<br>right now?</h1>
    <p class="control-panel__lead">Write one feeling, question, or situation. Your past and future selves are listening.</p>

    <form id="situation-form" class="control-form">
      <label for="situation">Your present moment</label>
      <textarea id="situation" name="situation" rows="4" maxlength="600"
        placeholder="I have been feeling…" required autofocus></textarea>
      <div class="control-form__actions">
        <button id="submit-button" class="primary-button" type="submit">Send across time <span>↗</span></button>
        <button id="reset-button" class="text-button" type="button">Reset both screens</button>
      </div>
      <p class="form-status" id="form-status" aria-live="polite">Ready. Your words stay on this local computer.</p>
    </form>

    <aside class="screen-guide">
      <a href="/future" target="_blank"><strong>Left screen</strong><span>/future</span><em>Yellow-green circles</em></a>
      <a href="/past" target="_blank"><strong>Right screen</strong><span>/past</span><em>Blue-purple polygons</em></a>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='interaction.js') }}"></script>
</body>
</html>
